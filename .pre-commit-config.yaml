minimum_pre_commit_version: 4.0.0
exclude: ^LICENSES/|\.(html|csv|svg)$

default_stages: [pre-commit]
ci:
  autofix_prs: false
  autoupdate_schedule: monthly

repos:
  # pre-commit 基础检查
  - repo: https://gitcode.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-json

  # -------------------------- Python 核心检查 --------------------------
  # Ruff：指定读取 pre-commit/pyproject.toml
  - repo: https://gitcode.com/gh_mirrors/ru/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff-check
        args: ["--config", "pre-commit/pyproject.toml", "--output-format", "github", "--fix"]
        types: [python]
      - id: ruff-format
        args: ["--config", "pre-commit/pyproject.toml"]
        types: [python]

  # codespell
  - repo: https://gitcode.com/gh_mirrors/co/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: [
            "-L",
            "CANN,cann,NNAL,nnal,ASCEND,ascend,EnQue,CopyIn,ArchType,AND,ND,tbe,copyin,alog,te",
            "--skip",
            "*.toml,*.py,*.cpp,*.hpp,*.c,*.h",
          ]

  # pylint：指定 pre-commit/pyproject.toml
  - repo: https://gitcode.com/gh_mirrors/pyl/pylint
    rev: v4.0.5
    hooks:
      - id: pylint
        name: pylint (Python code quality check)
        types: [python]
        args: ["--rcfile=pre-commit/pyproject.toml"]
        verbose: false

  # Bandit：指定 pre-commit/pyproject.toml
  - repo: https://gitcode.com/gh_mirrors/ba/bandit
    rev: 1.9.4
    hooks:
      - id: bandit
        name: bandit (Python 安全漏洞检查)
        types: [python]
        args: [
          "--config=pre-commit/pyproject.toml",
          "--quiet",
        ]
        additional_dependencies: ["bandit[toml]"]

  # typos
  - repo: https://gitcode.com/gh_mirrors/ty/typos
    rev: v1.32.0
    hooks:
      - id: typos
        args: ["--force-exclude", "--config", "pre-commit/typos.toml"]

  #--------------- C++ 核心检查 ---------------------------------------------
  - repo: https://gitcode.com/pre-commit-clang/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        files: \.(c|h|cpp|hpp|cc|hh|cxx|hxx)$
        args:
          - "--style=file"  # 读取 .clang-format 文件
          - "--verbose"
          - "-i"

# -------------------------- Gitleaks 本地离线二进制扫描 --------------------------
# 本地执行pre-commit hook前，需要先下载对应平台的gitleaks二进制文件到项目根目录
# 临时跳过检查：SKIP=gitleaks-offline-scan git commit
# Linux环境：（注：该OBS地址为内网地址，仅支持HTTP；建议下载后自行校验文件完整性）
#   wget --no-host-directories -c --no-check-certificate http://pytorch-package.obs.cn-north-4.myhuaweicloud.com/pta-codecheck/gitleaks
# Windows环境：下载后解压，将gitleaks.exe重命名为gitleaks放到项目根目录
#   https://github.com/gitleaks/gitleaks/releases/download/v8.20.0/gitleaks_8.20.0_windows_x64.zip
  - repo: local
    hooks:
      - id: gitleaks-offline-scan
        name: Gitleaks Secret Scan(Local Binary)
        entry: ./gitleaks
        language: system
        pass_filenames: true
        args:
          - protect
          - --verbose
          - --redact
          - --config=pre-commit/.gitleaks.toml

        stages: [pre-commit]
